<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>setup · stash</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="centered">
  <div class="wizard">
    <div class="wizard-header">
      <div class="title">welcome</div>
      <div class="subtitle">let's set up your gallery</div>
    </div>

    <div class="steps">
      <div class="step active current" data-step="1">1 · account</div>
      <div class="step" data-step="2">2 · folder</div>
      <div class="step" data-step="3">3 · done</div>
    </div>

    <div class="step-panel active" id="panel-1">
      <div class="field">
        <label for="username">username</label>
        <input type="text" id="username" autocomplete="username" placeholder="e.g. hassan">
      </div>
      <div class="field">
        <label for="password">password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="at least 8 characters">
      </div>
      <div class="field">
        <label for="passwordConfirm">confirm password</label>
        <input type="password" id="passwordConfirm" autocomplete="new-password">
      </div>
      <div class="error" id="error-1"></div>
      <button type="button" class="primary" id="next-1">next</button>
    </div>

    <div class="step-panel" id="panel-2">
      <div class="field">
        <label for="folderPath">captures folder path</label>
        <input type="text" id="folderPath" placeholder="C:\Users\YourName\Videos\Captures" spellcheck="false" autocomplete="off">
        <div class="hint">paste the full path to the folder where your game folders live. each subfolder = one game.</div>
      </div>
      <div class="folder-status" id="folderStatus"></div>
      <div class="error" id="error-2"></div>
      <div class="actions">
        <button type="button" class="ghost" id="back-2">back</button>
        <button type="button" class="primary" id="next-2">finish</button>
      </div>
    </div>

    <div class="step-panel" id="panel-3">
      <div class="success-icon">✓</div>
      <div class="success-msg">all set</div>
      <div class="success-sub">your gallery is ready to use</div>
      <button type="button" class="primary" id="goLogin">log in</button>
    </div>
  </div>

  <script src="/setup.js"></script>
</body>
</html>
