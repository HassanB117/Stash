<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/style.css?v=ui-grid-fix-20260513">
</head>
<body class="centered auth-page">

  <div class="brand-block brand-block-lg">
    <div class="brand-title">STASH</div>
    <div class="brand-subtitle">CAPTURE ARCHIVE <span data-app-version></span></div>
  </div>

  <form id="loginForm" class="login-card" aria-describedby="error">
    <div class="form-kicker">// AUTHENTICATE</div>
    <input type="text" id="username" placeholder="username" autocomplete="username" autofocus required>
    <input type="password" id="password" placeholder="password" autocomplete="current-password" required>
    <button type="submit">ACCESS SYSTEM</button>
    <div class="error" id="error" aria-live="polite"></div>
    <div class="form-link-row">
      <a href="/setup" id="setupLink" class="form-link">
        FIRST RUN → SETUP
      </a>
    </div>
  </form>

  <div class="system-time" id="sysTime" aria-live="polite"></div>

  <script src="/common.js"></script>
  <script src="/login.js"></script>
</body>
</html>
