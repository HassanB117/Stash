<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=capture-mark-white-20260513">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/style.css?v=nav-center-20260513">
</head>
<body class="app-shell">

  <!-- ── Topbar ─────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">STASH</div>
      <div class="topbar-info">
        <div class="title" id="hello">captures</div>
        <div class="subtitle" id="folderLabel"></div>
      </div>
    </div>

    <div class="topbar-tabs" role="tablist" aria-label="Capture sections">
      <button class="tab-btn active" id="tabRecent" type="button" role="tab" aria-selected="true" aria-controls="panelRecent">
        RECENT <span class="tab-count" id="recentCount">0</span>
      </button>
      <button class="tab-btn" id="tabGames" type="button" role="tab" aria-selected="false" aria-controls="panelGames">
        GAMES <span class="tab-count" id="gamesCount">0</span>
      </button>
      <button class="tab-btn" id="tabStarred" type="button" role="tab" aria-selected="false" aria-controls="panelStarred">
        STARRED <span class="tab-count" id="starredCount">0</span>
      </button>
    </div>

    <div class="topbar-actions">
      <div class="status-live" aria-live="polite">
        <div class="status-dot"></div>
        <span id="syncStatus">LIVE</span>
      </div>
      <button type="button" class="ghost" id="refreshBtn" aria-label="Refresh captures" title="Refresh captures"><span class="btn-icon" aria-hidden="true">↻</span><span class="btn-label">REFRESH</span></button>
      <button type="button" class="ghost" id="settingsBtn" aria-label="Open settings" title="Settings"><span class="btn-icon" aria-hidden="true">⚙</span><span class="btn-label">SETTINGS</span></button>
      <button type="button" class="ghost" id="logoutBtn" aria-label="Log out" title="Log out"><span class="btn-icon" aria-hidden="true">⏻</span><span class="btn-label">LOGOUT</span></button>
    </div>
  </header>

  <!-- ── RECENT tab panel ───────────────────────────────────────────── -->
  <div class="tab-panel active" id="panelRecent" role="tabpanel" aria-labelledby="tabRecent">
    <main class="grid" id="grid" aria-live="polite"></main>
    <div class="recent-footer">
      <button type="button" class="ghost" id="recentMoreBtn">LOAD MORE</button>
      <div class="recent-count" id="recentShownCount" aria-live="polite"></div>
    </div>
  </div>

  <!-- ── STARRED tab panel ─────────────────────────────────────────── -->
  <div class="tab-panel" id="panelStarred" role="tabpanel" aria-labelledby="tabStarred" hidden>
    <main class="grid" id="starredGrid" aria-live="polite"></main>
  </div>

  <!-- ── GAMES tab panel ───────────────────────────────────────────── -->
  <div class="tab-panel" id="panelGames" role="tabpanel" aria-labelledby="tabGames" hidden>

    <!-- Game library view -->
    <div id="gamesLibrary" class="panel-stack">
      <div class="games-header">
        <div class="games-search-wrap">
          <span class="games-search-icon" aria-hidden="true">⌕</span>
          <input type="text" class="games-search" id="gamesSearch" placeholder="search games..." autocomplete="off" spellcheck="false" aria-label="Search games">
        </div>
        <div class="platform-pills" id="platformPills" aria-label="Platform filters" hidden></div>
        <div class="games-count" id="gamesCountLabel" aria-live="polite"></div>
      </div>
      <div class="games-grid-wrap" id="gamesGrid"></div>
    </div>

    <!-- Game drill-down view (hidden until a game is selected) -->
    <div id="gameDrilldown" class="panel-stack" hidden>
      <div class="drilldown-bar">
        <button type="button" class="drilldown-back" id="backToGames">← GAMES</button>
        <div class="drilldown-sep"></div>
        <div class="drilldown-title" id="drilldownTitle"></div>
        <div class="drilldown-count" id="drilldownCount" aria-live="polite"></div>
      </div>
      <main class="grid" id="drilldownGrid" aria-live="polite"></main>
    </div>

  </div>

  <!-- ── Lightbox ──────────────────────────────────────────────────── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Capture viewer" aria-hidden="true">
    <div class="lb-controls">
      <button type="button" class="lb-star" id="lbStar" aria-label="Star capture">☆ STAR</button>
      <button type="button" class="lb-share" id="lbShare" aria-label="Create share link">⤴ SHARE</button>
      <button type="button" class="lb-close" id="lbClose" aria-label="Close viewer">×</button>
    </div>
    <button type="button" class="lb-nav lb-prev" id="lbPrev" aria-label="Previous capture" hidden><svg class="lb-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="15 5 8 12 15 19"></polyline></svg></button>
    <button type="button" class="lb-nav lb-next" id="lbNext" aria-label="Next capture" hidden><svg class="lb-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polyline points="9 5 16 12 9 19"></polyline></svg></button>
    <div class="lb-content" id="lbContent"></div>
    <div class="lb-meta" id="lbMeta" hidden>
      <span class="lb-meta-game" id="lbGame"></span>
      <div class="lb-meta-sep"></div>
      <span class="lb-meta-platform" id="lbPlatform" hidden></span>
      <div class="lb-meta-sep" id="lbPlatformSep" hidden></div>
      <span class="lb-meta-name" id="lbName"></span>
      <div class="lb-meta-sep"></div>
      <span class="lb-meta-date" id="lbDate"></span>
      <div class="lb-meta-sep" id="lbMetaSep2" hidden></div>
      <span class="lb-meta-detail" id="lbDetail" hidden></span>
    </div>
  </div>

  <!-- ── Share modal ───────────────────────────────────────────────── -->
  <div class="modal" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle" aria-hidden="true">
    <div class="modal-card" role="document">
      <div class="modal-title" id="shareModalTitle">SHARE LINK</div>
      <div class="modal-sub">EXPIRES IN 24 HOURS · READ-ONLY</div>
      <input type="text" id="shareUrl" readonly aria-label="Share URL">
      <div class="modal-actions">
        <button type="button" id="copyBtn">⊕ COPY</button>
        <button type="button" class="ghost" id="shareClose">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- ── Settings modal ────────────────────────────────────────────── -->
  <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle" aria-hidden="true">
    <div class="modal-card modal-card-wide" role="document">
      <div class="modal-title" id="settingsModalTitle">SYSTEM CONFIG</div>
      <div class="modal-sub">// SETTINGS</div>

      <div class="settings-section">
        <label for="folderInput">// CAPTURE PATH</label>
        <input type="text" id="folderInput" spellcheck="false" autocomplete="off">
        <div class="modal-actions">
          <button type="button" id="saveFolderBtn">UPDATE</button>
        </div>
        <div class="settings-msg" id="folderMsg" aria-live="polite"></div>
      </div>

      <div class="settings-section">
        <label for="siteUrlInput">// PUBLIC SITE URL</label>
        <input type="text" id="siteUrlInput" spellcheck="false" autocomplete="off" placeholder="https://stash.example.com">
        <div class="modal-actions">
          <button type="button" id="saveSiteUrlBtn">UPDATE</button>
        </div>
        <div class="settings-msg" id="siteUrlMsg" aria-live="polite"></div>
      </div>

      <div class="settings-section">
        <label>// CHANGE PASSWORD</label>
        <input type="password" id="currentPass" placeholder="current password" autocomplete="current-password">
        <input type="password" id="newPass" placeholder="new password (8+ chars)" autocomplete="new-password">
        <div class="modal-actions">
          <button type="button" id="savePassBtn">CHANGE</button>
        </div>
        <div class="settings-msg" id="passMsg" aria-live="polite"></div>
      </div>

      <div class="settings-section">
        <label>// RENDER MODE</label>
        <div class="render-mode-options" id="renderModeOptions">
          <label class="render-mode-option">
            <input type="radio" name="settingsRenderMode" value="software">
            <div>
              <div class="render-mode-title">Software</div>
              <div class="render-mode-desc">works everywhere</div>
            </div>
          </label>
          <label class="render-mode-option">
            <input type="radio" name="settingsRenderMode" value="hardware">
            <div>
              <div class="render-mode-title">Hardware <span id="hardwareLabel" class="render-mode-hint">auto-detect</span></div>
              <div class="render-mode-desc" id="hardwareDesc">uses NVENC / QSV / AMF if available</div>
            </div>
          </label>
        </div>
        <label for="hardwareDeviceSelect">// HARDWARE DEVICE</label>
        <select id="hardwareDeviceSelect">
          <option value="auto">Auto</option>
        </select>
        <div class="modal-actions">
          <button type="button" id="saveRenderBtn">APPLY</button>
        </div>
        <div class="settings-msg" id="renderMsg" aria-live="polite"></div>
      </div>

      <div class="settings-section">
        <label>// SECURITY</label>
        <div id="securityEnvNotice" class="settings-msg" style="display:none" aria-live="polite"></div>

        <label for="trustProxySelect" class="stacked-label">trust proxy</label>
        <select id="trustProxySelect">
          <option value="off">Off — direct connections only</option>
          <option value="on">On — trust any proxy</option>
          <option value="hops">Hops — trust N proxies</option>
        </select>
        <input type="number" id="trustProxyHops" min="1" max="9" step="1" value="1" class="compact-number" style="display:none;">

        <label for="cookieSecureSelect" class="stacked-label">cookie secure</label>
        <select id="cookieSecureSelect">
          <option value="auto">Auto — secure when request is HTTPS</option>
          <option value="true">Always — require HTTPS</option>
          <option value="false">Never — allow plain HTTP</option>
        </select>

        <div class="modal-actions">
          <button type="button" id="saveSecurityBtn">SAVE</button>
        </div>
        <div class="settings-msg" id="securityMsg" aria-live="polite"></div>
      </div>

      <div class="modal-actions modal-actions-footer">
        <button type="button" class="ghost" id="settingsClose">CLOSE</button>
      </div>
      <div class="modal-version">STASH <span data-app-version></span></div>
    </div>
  </div>

  <!-- Mobile bottom tab bar (hidden on desktop via CSS) -->
  <nav class="mobile-tabs" id="mobileTabs" role="tablist" aria-label="Capture sections">
    <button class="mobile-tab active" id="mTabRecent" type="button" role="tab" aria-selected="true" aria-controls="panelRecent">
      <span class="mobile-tab-icon">⊞</span>
      <span class="mobile-tab-label">RECENT</span>
      <span class="mobile-tab-badge" id="mBadgeRecent"></span>
    </button>
    <button class="mobile-tab" id="mTabGames" type="button" role="tab" aria-selected="false" aria-controls="panelGames">
      <span class="mobile-tab-icon">◈</span>
      <span class="mobile-tab-label">GAMES</span>
      <span class="mobile-tab-badge" id="mBadgeGames"></span>
    </button>
    <button class="mobile-tab" id="mTabStarred" type="button" role="tab" aria-selected="false" aria-controls="panelStarred">
      <span class="mobile-tab-icon">★</span>
      <span class="mobile-tab-label">STARRED</span>
      <span class="mobile-tab-badge" id="mBadgeStarred"></span>
    </button>
  </nav>

  <script src="/common.js?v=nav-center-20260513"></script>
  <script src="/app.js?v=nav-center-20260513"></script>
</body>
</html>
