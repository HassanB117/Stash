<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stash</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="title" id="hello">captures</div>
      <div class="subtitle" id="folderLabel"></div>
    </div>
    <div class="topbar-actions">
      <button type="button" class="ghost" id="settingsBtn">settings</button>
      <button type="button" class="ghost" id="logoutBtn">logout</button>
    </div>
  </header>

  <nav class="filters" id="filters"></nav>
  <main class="grid" id="grid"></main>

  <div class="lightbox" id="lightbox">
    <button type="button" class="lb-close" id="lbClose">×</button>
    <button type="button" class="lb-share" id="lbShare">share</button>
    <div class="lb-content" id="lbContent"></div>
  </div>

  <div class="modal" id="shareModal">
    <div class="modal-card">
      <div class="modal-title">share link</div>
      <div class="modal-sub">expires in 24 hours</div>
      <input type="text" id="shareUrl" readonly>
      <div class="modal-actions">
        <button type="button" id="copyBtn">copy</button>
        <button type="button" class="ghost" id="shareClose">close</button>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-card">
      <div class="modal-title">settings</div>
      <div class="settings-section">
        <label for="folderInput">captures folder</label>
        <input type="text" id="folderInput" spellcheck="false" autocomplete="off">
        <div class="modal-actions">
          <button type="button" id="saveFolderBtn">update folder</button>
        </div>
        <div class="settings-msg" id="folderMsg"></div>
      </div>
      <div class="settings-section">
        <label>change password</label>
        <input type="password" id="currentPass" placeholder="current password" autocomplete="current-password">
        <input type="password" id="newPass" placeholder="new password (8+ chars)" autocomplete="new-password">
        <div class="modal-actions">
          <button type="button" id="savePassBtn">change password</button>
        </div>
        <div class="settings-msg" id="passMsg"></div>
      </div>
      <div class="modal-actions" style="margin-top: 20px;">
        <button type="button" class="ghost" id="settingsClose">close</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
