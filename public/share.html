<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=capture-mark-white-20260513">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stash · shared capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/style.css?v=ui-grid-fix-20260513">
</head>
<body class="share-page">
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">STASH</div>
      <div class="topbar-info">
        <div class="title">shared capture</div>
        <div class="subtitle" id="statusLabel" aria-live="polite">RETRIEVING FROM ARCHIVE...</div>
      </div>
    </div>
  </header>

  <main class="share-container">
    <div class="share-card" id="shareCard" hidden>
      <div class="share-media-wrap" id="mediaWrap">
        <!-- Media inserted here -->
      </div>
      <div class="share-info">
        <div class="share-filename" id="filename">// FILENAME</div>
        <div class="share-meta-row">
          <span id="fileType">// TYPE</span>
          <span class="share-expiry" id="expiry">// EXPIRES</span>
        </div>
      </div>
    </div>

    <div id="loading" class="loading" role="status" aria-live="polite">
      // LOADING DATA...
    </div>

    <footer class="share-footer">
      POWERED BY <a href="https://github.com/hsn-yx/stash" target="_blank" rel="noopener noreferrer">STASH</a>
    </footer>
  </main>

  <script src="/common.js"></script>
  <script src="/share.js"></script>
</body>
</html>
