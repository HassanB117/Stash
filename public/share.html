<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stash · shared capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/style.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
  }
  .share-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
  }
  .share-card {
    max-width: 1000px;
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .share-media-wrap {
    width: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }
  .share-media-wrap img {
    max-width: 100%;
    max-height: 80vh;
    display: block;
    object-fit: contain;
  }
  .share-media-wrap .vplayer {
    border: none;
    box-shadow: none;
    width: 100%;
  }
  .share-info {
    padding: 16px 20px;
    background: linear-gradient(to right, #0a0a0a, #050505);
    border-top: 1px solid var(--border);
  }
  .share-filename {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    word-break: break-all;
  }
  .share-meta-row {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .share-expiry {
    color: var(--accent);
    opacity: 0.8;
  }
  .share-footer {
    margin-top: 30px;
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .share-footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .share-footer a:hover {
    color: var(--accent);
  }

  @media (max-width: 600px) {
    .topbar { padding: 0 15px; height: 60px; }
    .topbar-logo { font-size: 20px; }
    .share-container { padding: 10px; }
    .share-info { padding: 12px 15px; }
    .share-filename { font-size: 14px; }
    .share-meta-row { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">STASH</div>
      <div class="topbar-info">
        <div class="title">shared capture</div>
        <div class="subtitle" id="statusLabel">RETRIEVING FROM ARCHIVE...</div>
      </div>
    </div>
  </header>

  <main class="share-container">
    <div class="share-card" id="shareCard" style="display:none;">
      <div class="share-media-wrap" id="mediaWrap">
        <!-- Media inserted here -->
      </div>
      <div class="share-info">
        <div class="share-filename" id="filename">// FILENAME</div>
        <div class="share-meta-row">
          <span id="fileType">// TYPE</span>
          <span class="share-expiry" id="expiry">// EXPIRES</span>
        </div>
      </div>
    </div>

    <div id="loading" style="font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--text-dim);">
      // LOADING DATA...
    </div>

    <footer class="share-footer">
      POWERED BY <a href="https://github.com/hsn-yx/stash" target="_blank">STASH</a>
    </footer>
  </main>

  <script src="/common.js"></script>
  <script src="/share.js"></script>
</body>
</html>
